version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.52
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Agents
  resume-parser:
    build:
      context: .
      dockerfile: Dockerfile.parser
    environment:
      - ENABLE_LOGGING=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

  vacancy-matcher:
    build:
      context: .
      dockerfile: Dockerfile.matcher
    environment:
      - ENABLE_LOGGING=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

  interview-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    environment:
      - ENABLE_LOGGING=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

  feedback-agent:
    build:
      context: .
      dockerfile: Dockerfile.feedback
    environment:
      - ENABLE_LOGGING=true
      - REDIS_URL=redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Python Orchestrator & API
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=${OLLAMA_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama2}
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: hr-multi-agent-network
